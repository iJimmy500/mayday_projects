<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/projects.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline' blob: https://*.youtube.com https://*.youtube-nocookie.com https://*.ytimg.com https://static.cloudflareinsights.com https://itunes.apple.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https: data:; frame-src 'self' https://*.youtube.com https://youtube.com https://*.youtube-nocookie.com https://youtube-nocookie.com; media-src 'self' https: blob: data:; connect-src 'self' https: http://127.0.0.1:8001 http://localhost:8001 https://static.cloudflareinsights.com https://cloudflareinsights.com https://itunes.apple.com https://lrclib.net;">
  <meta name="description" content="Projects by Mayinflight - A collection of different projects." />
  <meta property="og:title" content="Mayday" />
  <meta property="og:description" content="Projects by Mayinflight" />
  <meta property="og:image" content="/mayinflight.jpeg" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Mayday" />
  <meta name="twitter:description" content="Projects by Mayinflight" />
  <meta name="twitter:image" content="/mayinflight.jpeg" />
  <title>Mayday</title>
  <script>
    (function () {
      // Dynamic Meta Tags for Social Sharing
      var path = window.location.pathname;
      var title = "Mayday";
      var desc = "Projects by Mayinflight";
      var img = "/mayinflight.jpeg"; // Default

      if (path === '/day2' || path === '/birthday' || path === '/bday') {
        desc = "my birthday list";
        img = "/james.jpeg";
      } else if (path === '/day12' || path === '/weather' || path === '/drakeweather') {
        desc = "Drakes Weather";
        img = "/iceman.png";
      }

      // Update existing meta tags or add them
      var setMeta = function (selector, attr, value) {
        var el = document.querySelector(selector);
        if (el) el.setAttribute(attr, value);
      };

      setMeta('meta[property="og:description"]', 'content', desc);
      setMeta('meta[property="og:image"]', 'content', img);
      setMeta('meta[name="twitter:description"]', 'content', desc);
      setMeta('meta[name="twitter:image"]', 'content', img);
      document.title = title;

      // Check for features required by modern React/Vite apps
      var isLegacy = false;
      try {
        // Check for basic ES6+ and modern features
        if (typeof Promise === 'undefined' ||
          typeof fetch === 'undefined' ||
          typeof Object.assign === 'undefined' ||
          !window.CSS || !CSS.supports('display', 'grid') ||
          !Array.prototype.flat ||
          !Object.fromEntries) {
          isLegacy = true;
        }
        // Specific check for older iOS versions (iPhone 5S maxes out at iOS 12.5.7)
        var ua = navigator.userAgent;
        if (/iPhone|iPad|iPod/.test(ua)) {
          var versionMatch = ua.match(/OS (\d+)_/);
          if (versionMatch && parseInt(versionMatch[1]) < 13) {
            isLegacy = true;
          }
        }
      } catch (e) {
        isLegacy = true;
      }

      if (isLegacy) {
        window.location.href = '/legacy.html';
      }
    })();
  </script>
  <style>
    body {
      background-color: #0a0a0a;
      margin: 0;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
